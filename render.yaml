# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render; settings below apply on first deploy.
services:
  - type: web
    name: staylight
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
